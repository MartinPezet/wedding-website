name: PR checks

on: pull_request

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: eu-west-2
  TF_VAR_github_repository: ${{ github.server_url }}/${{ github.repository }}
  TF_VAR_github_access_token: ${{ secrets.AMPLIFY_GITHUB_PAT }}
  TF_VAR_nuxt_site_password: ${{ secrets.NUXT_SITE_PASSWORD }}
  TF_VAR_nuxt_admin_password: ${{ secrets.NUXT_ADMIN_PASSWORD }}
  TF_VAR_nuxt_session_password: ${{ secrets.NUXT_SESSION_PASSWORD }}
  TF_VAR_nuxt_backup_secret: ${{ secrets.BACKUP_SECRET }}
  TF_VAR_turso_database_url: ${{ secrets.TURSO_DATABASE_URL }}
  TF_VAR_turso_auth_token: ${{ secrets.TURSO_AUTH_TOKEN }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - name: Migration dry-run
        run: npx drizzle-kit check

      - name: Terraform plan
        run: |
          terraform -chdir=infra init -input=false
          terraform -chdir=infra plan -input=false
